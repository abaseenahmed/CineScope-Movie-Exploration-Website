<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var k = 'cineScopeTheme';
          var t = localStorage.getItem(k);
          var d = document.documentElement;
          d.classList.remove('dark', 'light');
          if (t === 'dark') d.classList.add('dark');
          else if (t === 'light') d.classList.add('light');
          else if (window.matchMedia('(prefers-color-scheme: dark)').matches) d.classList.add('dark');
          else d.classList.add('light');
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fafafa" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <title>CineScope — Discover Film</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
